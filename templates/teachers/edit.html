{% extends 'base.html' %}
{% block title %}Edit Teacher{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:560px;">
  <div class="d-flex justify-content-between align-items-center mb-1">
    <h5 class="fw-bold mb-0" style="background:linear-gradient(90deg,#f472b6,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
      <i class="bi bi-person-badge me-2" style="-webkit-text-fill-color:#f472b6;"></i>Edit Teacher
    </h5>
    <a href="{% url 'teacher_list' %}" class="btn btn-sm" style="border:1px solid rgba(255,255,255,0.3); color:#e2e8f0; background:transparent;">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>
  <p style="color:rgba(255,255,255,0.5); font-size:.85rem;" class="mb-4">
    {{ teacher.get_full_name|default:teacher.username }} — reassign courses below
  </p>

  <form method="post">
    {% csrf_token %}
    <label class="form-label d-block mb-2">
      <i class="bi bi-book me-1" style="color:#a78bfa;"></i>Assigned Courses
    </label>
    <div class="row g-2 mb-4">
      {% for c in courses %}
      <div class="col-md-6">
        <label class="d-flex align-items-center gap-2 p-2 rounded" style="cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);"
          onmouseover="this.style.background='rgba(167,139,250,0.1)'"
          onmouseout="this.style.background='rgba(255,255,255,0.04)'">
          <input type="checkbox" name="courses" value="{{ c.id }}" style="accent-color:#a78bfa;"
            {% if c.id in assigned_ids %}checked{% endif %}>
          <span style="color:#e2e8f0; font-size:.88rem;">{{ c.course_name }}</span>
        </label>
      </div>
      {% endfor %}
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save</button>
      <a href="{% url 'teacher_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
