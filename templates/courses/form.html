{% extends 'base.html' %}
{% block title %}{{ action }} Course{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:520px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-book me-2"></i>{{ action }} Course</h5>
    <a href="{% url 'course_list' %}" class="btn btn-sm" style="border:1px solid rgba(255,255,255,0.3); color:#e2e8f0; background:transparent;">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Course Name</label>
      <input type="text" name="course_name" class="form-control" value="{{ course.course_name|default:'' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Assign Teacher</label>
      <select name="teacher" class="form-select">
        <option value="">— Select Teacher —</option>
        {% for t in teachers %}
        <option value="{{ t.id }}" {% if course.teacher_id == t.id %}selected{% endif %}>{{ t.get_full_name|default:t.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">{{ action }}</button>
      <a href="{% url 'course_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
