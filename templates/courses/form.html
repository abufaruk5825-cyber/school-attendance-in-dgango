{% extends 'base.html' %}
{% block title %}{{ action }} Course{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:520px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-book me-2"></i>{{ action }} Course</h5>
    <a href="{% url 'course_list' %}" class="btn btn-sm" style="border:1px solid rgba(255,255,255,0.3); color:#e2e8f0; background:transparent;">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Course Name <span class="text-danger">*</span></label>
      <input type="text" name="course_name" class="form-control" value="{{ course.course_name|default:'' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Class Group <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
      <div class="d-flex gap-2 align-items-center">
        <select name="class_group" class="form-select" id="classGroupSelect">
          <option value="">— No Class —</option>
          {% for c in classes %}
          <option value="{{ c.id }}" {% if course.class_group_id == c.id %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="document.getElementById('classGroupSelect').value=''" title="Remove class">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <small style="color:var(--text-muted); font-size:.75rem; margin-top:.3rem; display:block;">
        Click <strong>✕</strong> to remove the class assignment
      </small>
    </div>
    <div class="mb-3">
      <label class="form-label">Assign Teacher <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
      <select name="teacher" class="form-select">
        <option value="">— Select Teacher —</option>
        {% for t in teachers %}
        <option value="{{ t.id }}" {% if course.teacher_id == t.id %}selected{% endif %}>{{ t.get_full_name|default:t.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>{% if action == 'Add' %}Save Course{% else %}Save Changes{% endif %}</button>
      <a href="{% url 'course_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
