{% extends 'base.html' %}
{% block title %}{{ action }} Subject{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title"><i class="bi bi-journal-bookmark me-2"></i>{{ action }} Subject</div></div>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
      <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Subjects</a></li>
      <li class="breadcrumb-item active">{{ action }}</li>
    </ol>
  </nav>
</div>
<div class="card p-4" style="max-width:520px;">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Subject Name <span style="color:#f87171;">*</span></label>
      <input type="text" name="subject_name" class="form-control" value="{{ subject.subject_name|default:'' }}" placeholder="e.g. Mathematics, Physics" required>
    </div>
    <div class="mb-3">
      <label class="form-label"><i class="bi bi-building me-1" style="color:#38bdf8;"></i>Class</label>
      <select name="class_group" class="form-select">
        <option value="">— Select Class —</option>
        {% for c in classes %}
        <option value="{{ c.id }}" {% if subject.class_group_id == c.id %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label"><i class="bi bi-person-badge me-1" style="color:#a78bfa;"></i>Teacher</label>
      <select name="teacher" class="form-select">
        <option value="">— Unassigned —</option>
        {% for t in teachers %}
        <option value="{{ t.id }}" {% if subject.teacher_id == t.id %}selected{% endif %}>{{ t.get_full_name|default:t.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>{{ action }}</button>
      <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
